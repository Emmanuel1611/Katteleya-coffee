{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Hero Banner -->
<section class="relative min-h-[45vh] md:min-h-[50vh] bg-cover bg-center bg-no-repeat flex items-center justify-center"
         style="background-image: url('{% static "images/shop-bg.jpg" %}');">
  <div class="absolute inset-0 bg-black/65"></div>
  <div class="relative z-10 text-center text-white px-4 sm:px-6">
    <div class="mt-5 sm:mt-7 flex items-center justify-center gap-3 text-base sm:text-lg font-medium">
    </div>
  </div>
</section>

<section class="bg-white py-8 sm:py-12 md:py-16">
  <div class="max-w-[1420px] mx-auto px-4 sm:px-5 md:px-8">
    <div class="grid grid-cols-1 xl:grid-cols-[320px_1fr] gap-8 sm:gap-10">

      <!-- Sidebar -->
      <aside class="space-y-8 sm:space-y-12">

        <!-- Search -->
        <div class="bg-emerald-700 p-5 sm:p-6 rounded-2xl">
          <form method="GET" action="{% url 'shop:shop' %}" id="searchForm">
            <div class="bg-white rounded-full h-12 sm:h-14 flex items-center pl-6 pr-2">
              <input type="text" name="q" id="searchInput" 
                     value="{{ query|default_if_none:'' }}" 
                     placeholder="Search products..." 
                     class="w-full bg-transparent border-0 outline-none text-base sm:text-lg placeholder:text-gray-500">
              <button type="submit" class="h-10 sm:h-11 w-10 sm:w-11 bg-black text-white rounded-full flex items-center justify-center">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
            </div>
          </form>
        </div>

        <!-- Product Categories -->
        <div>
          <h3 class="flex items-center gap-3 text-xl sm:text-2xl font-bold text-gray-900">
            <i class="fa-solid fa-mug-hot text-emerald-600"></i>
            PRODUCT CATEGORIES
          </h3>
          <div class="h-px bg-gray-200 mt-4 mb-6"></div>
          <ul class="space-y-4 text-base sm:text-[17px] font-medium text-gray-700">
            <li><a href="#" class="hover:text-emerald-600 transition">› Cattleya's Green</a></li>
            <li><a href="#" class="hover:text-emerald-600 transition">› Cattley's Pure Arabica</a></li>
            <li><a href="#" class="hover:text-emerald-600 transition">› Cattley's Blend</a></li>
          </ul>
        </div>

      </aside>

      <!-- Products Area -->
      <div>
        <div class="bg-[#f8f4eb] px-5 sm:px-8 py-4 sm:py-5 flex items-center justify-between mb-8 sm:mb-10 rounded-2xl">
          <p class="text-base sm:text-lg font-medium text-gray-700" id="results-text">
            Showing {{ products|length }} results
          </p>
          <div class="flex items-center gap-3 text-gray-600">
            <span>Default sorting</span>
            <i class="fa-solid fa-chevron-down"></i>
          </div>
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 sm:gap-8">
          {% include 'shop/_products_partial.html' %}
        </div>
      </div>

    </div>
  </div>
</section>

<style>
#products-grid {
    transition: opacity 0.3s ease;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Price slider constants
  const MAX_PRICE = 50000;
  const slider = document.getElementById('priceSlider');
  const leftThumb = document.getElementById('leftThumb');
  const rightThumb = document.getElementById('rightThumb');
  const rangeFill = document.getElementById('rangeFill');
  const minPriceInput = document.getElementById('minPrice');
  const maxPriceInput = document.getElementById('maxPrice');
  const minValSpan = document.getElementById('minVal');
  const maxValSpan = document.getElementById('maxVal');
  const filterBtn = document.getElementById('filterBtn');
  const resultsText = document.getElementById('results-text');
  const searchInput = document.getElementById('searchInput');
  let priceTimeout, searchTimeout;
  let isDragging = false;

  function formatPrice(num) {
    return parseInt(num).toLocaleString() + '.00';
  }

  function setThumbPosition(thumb, percent) {
    thumb.style.left = percent + '%';
  }

  function updateRangeFill() {
    const leftPos = parseFloat(leftThumb.style.left) || 0;
    const rightPos = parseFloat(rightThumb.style.left) || 100;
    rangeFill.style.left = leftPos + '%';
    rangeFill.style.width = (rightPos - leftPos) + '%';
  }

  function updatePriceValues() {
    const minPercent = parseFloat(leftThumb.style.left) || 0;
    const maxPercent = parseFloat(rightThumb.style.left) || 100;
    const minPrice = Math.round((minPercent / 100) * MAX_PRICE);
    const maxPrice = Math.round((maxPercent / 100) * MAX_PRICE);
    minPriceInput.value = minPrice;
    maxPriceInput.value = maxPrice;
    minValSpan.textContent = formatPrice(minPrice);
    maxValSpan.textContent = formatPrice(maxPrice);
    updateRangeFill();
  }

  function initSlider() {
    const minPercent = (parseInt(minPriceInput.value) / MAX_PRICE) * 100;
    const maxPercent = (parseInt(maxPriceInput.value) / MAX_PRICE) * 100;
    setThumbPosition(leftThumb, minPercent);
    setThumbPosition(rightThumb, maxPercent);
    updatePriceValues();
  }

  function startDrag(thumb, isLeft) {
    isDragging = true;
    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag, { passive: false });
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
  }

  function drag(e) {
    if (!isDragging) return;
    e.preventDefault();
    const rect = slider.getBoundingClientRect();
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    let percent = ((clientX - rect.left) / rect.width) * 100;
    percent = Math.max(0, Math.min(100, percent));
    if (isLeftThumb) {
      percent = Math.min(percent, parseFloat(rightThumb.style.left) || 100);
    } else {
      percent = Math.max(percent, parseFloat(leftThumb.style.left) || 0);
    }
    setThumbPosition(thumb, percent);
    updatePriceValues();
  }

  function stopDrag() {
    isDragging = false;
    document.removeEventListener('mousemove', drag);
    document.removeEventListener('touchmove', drag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchend', stopDrag);
    // Auto filter after drag
    setTimeout(() => performFilter(), 100);
  }

  // Search
  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const query = this.value.trim();
    searchTimeout = setTimeout(() => performSearch(query), 300);
  });

  // Filter button AJAX
  filterBtn.addEventListener('click', function(e) {
    e.preventDefault();
    performFilter();
  });

  function performSearch(query) {
    const minPrice = minPriceInput.value;
    const maxPrice = maxPriceInput.value;
    const params = new URLSearchParams({ q: query || '', min_price: minPrice, max_price: maxPrice, partial: 'true' });
    fetch(`?${params}`)
      .then(r => r.text())
      .then(html => {
        document.getElementById('products-grid').innerHTML = html;
        updateResultsText(query, minPrice, maxPrice);
      })
      .catch(console.error);
  }

  function performFilter() {
    const query = searchInput.value.trim();
    performSearch(query);
  }

  function updateResultsText(query, minPrice, maxPrice) {
    let text = `Showing ${document.querySelectorAll('#products-grid article').length} results`;
    if (query) text += ` (search: "${query}")`;
    if (minPrice !== '0' || maxPrice !== '50000') text += ` (price: Ugx${formatPrice(minPrice)} - Ugx${formatPrice(maxPrice)})`;
    if (resultsText) resultsText.textContent = text;
  }

  // Init
  leftThumb.addEventListener('mousedown', () => startDrag(leftThumb, true));
  rightThumb.addEventListener('mousedown', () => startDrag(rightThumb, false));
  leftThumb.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(leftThumb, true); });
  rightThumb.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(rightThumb, false); });
  initSlider();
  updateResultsText(searchInput.value.trim(), minPriceInput.value, maxPriceInput.value);
});
</script>

{% endblock %}
