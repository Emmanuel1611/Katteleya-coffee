{% load static %}
<footer class="relative bg-cover bg-center text-white py-16" 
        style="background-image: url('{% static "images/footer-bg.jpg" %}');">
  
  <!-- Dark overlay -->
  <div class="absolute inset-0 bg-black/75"></div>

  <div class="relative max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12">

    <!-- Logo + Description -->
    <div>
      <img src="{% static 'images/logo.png' %}" alt="Cattleya’s Coffee" class="h-16 mb-6">
      <p class="text-gray-300 text-[15px] leading-relaxed max-w-xs">
        Etiam consequat sem ullamcorper, euismod metus sit amet, tristique justo. 
        Vestibulum mattis, nisi ut.
      </p>
      
      <!-- Social Icons -->
      <div class="flex gap-6 mt-10 text-2xl">
        <i class="fab fa-twitter hover:text-emerald-400 cursor-pointer transition"></i>
        <i class="fab fa-facebook-f hover:text-emerald-400 cursor-pointer transition"></i>
        <i class="fab fa-instagram hover:text-emerald-400 cursor-pointer transition"></i>
        <i class="fab fa-youtube hover:text-emerald-400 cursor-pointer transition"></i>
      </div>
    </div>

    <!-- Contact Info -->
    <div>
      <h3 class="text-emerald-500 font-medium text-lg mb-6 border-b border-emerald-500/30 pb-2">
        Contact Info
      </h3>
      <div class="space-y-5 text-sm">
        <p class="flex items-start gap-3">
          <i class="fas fa-map-marker-alt mt-1 text-emerald-500"></i>
          <span>Rio de Janeiro, RJ Brazil, 04103 Route</span>
        </p>
        <p class="flex items-start gap-3">
          <i class="fas fa-phone mt-1 text-emerald-500"></i>
          <span>+49078-039-23-11</span>
        </p>

      </div>
    </div>

    <!-- Subscribe -->
    <div>
      <h3 class="text-emerald-500 font-medium text-lg mb-6 border-b border-emerald-500/30 pb-2">
        Subscribe
      </h3>
      
      <div class="flex">
        <input type="email" 
               placeholder="Your email ..." 
               class="bg-white/10 border border-white/30 px-6 py-4 flex-1 focus:outline-none rounded-l-full text-sm placeholder:text-gray-400">
        <button class="slide-fill-btn rounded-l-none rounded-r-full px-9 font-medium">
          Subscribe
        </button>
      </div>


    </div>

  </div>

  <!-- Bottom Copyright -->
  <div class="relative text-center text-xs text-gray-400 py-8 border-t border-white/10 mt-12">
    Cattleya's Coffee © All Rights Reserved - 2026 
  </div>

  <!-- GO TOP BUTTON ( -->
  <button onclick="scrollToTop()" 
          id="goTopBtn"
          class="fixed bottom-8 right-8 bg-black hover:bg-zinc-900 w-16 h-16 rounded-full flex flex-col items-center justify-center shadow-2xl z-[9999] transition-all duration-300 border border-emerald-900/30 opacity-0">
    <i class="fas fa-leaf text-emerald-500 text-[29px] mb-0.5"></i>
    <span class="text-[10px] font-semibold tracking-widest text-white">GO TOP</span>
  </button>
  

</footer>
