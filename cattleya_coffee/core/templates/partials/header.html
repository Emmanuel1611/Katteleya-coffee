{% load static %}
<header class="absolute top-0 left-0 w-full bg-transparent text-white z-50">
  <div class="max-w-7xl mx-auto px-6">

    <!-- TOP ROW: Follow us | Logo | Icons -->
    <div class="flex items-center justify-between py-4">

      <!-- Left: Follow us + Social -->
      <div class="flex items-center gap-4 text-sm">
        <span class="font-medium">Follow us</span>
        <div class="flex gap-4">
          <i class="fab fa-twitter hover:text-emerald-400 cursor-pointer"></i>
          <i class="fab fa-facebook-f hover:text-emerald-400 cursor-pointer"></i>
          <i class="fab fa-instagram hover:text-emerald-400 cursor-pointer"></i>
          <i class="fab fa-youtube hover:text-emerald-400 cursor-pointer"></i>
        </div>
      </div>

      <!-- CENTER LOGO -->
      <div class="flex flex-col items-center -mt-1">
        <img src="{% static 'images/logo.png' %}" alt="Cattleya Coffee" class="h-40 w-auto">
      </div>

      <!-- Right Icons -->
      <div class="flex items-center gap-6 text-xl">
        <i class="fas fa-user hover:text-emerald-400 cursor-pointer"></i>
        <div class="relative cursor-pointer">
          <a href="{% url 'cart' %}">
            <i class="fas fa-shopping-bag"></i>
            <span
              class="absolute -top-1 -right-2 bg-emerald-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center">0</span>
          </a>
        </div>
      </div>
    </div>

    <!-- SECOND ROW: Nav Links Centered Below Logo -->
    <nav class="flex justify-center gap-10 pb-6 text-sm font-medium border-t border-white/20 pt-4">
      <a href="{% url 'home' %}" class="hover:text-emerald-400 transition">Home</a>
      <a href="{% url 'about' %}" class="hover:text-emerald-400 transition">About us</a>

      <!-- Products Dropdown -->

<a href="{% url 'shop:shop' %}" class="hover:text-emerald-400 transition">Products</a>

      <a href="{% url 'blog' %}" class="hover:text-emerald-400 transition">Blog</a>
      <a href="{% url 'contacts' %}" class="hover:text-emerald-400 transition">Contacts</a>
    </nav>

  </div>


  
</header>
