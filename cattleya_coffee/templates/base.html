<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Space+Grotesk:wght@500&amp;display=swap');

  .steam {
    animation: steam-rise 1.65s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    opacity: 0;
  }

  @keyframes steam-rise {
    0%   { 
      transform: translateY(0) scale(0.6); 
      opacity: 0; 
    }
    20%  { opacity: 0.85; }
    80%  { opacity: 0.85; }
    100% { 
      transform: translateY(-92px) scale(1.15); 
      opacity: 0; 
    }
  }

  /* Gentle stagger + natural variation */
  .steam:nth-child(1) { animation-delay: 0ms; }
  .steam:nth-child(2) { animation-delay: 120ms; }
  .steam:nth-child(3) { animation-delay: 240ms; }
  .steam:nth-child(4) { animation-delay: 80ms; }
  .steam:nth-child(5) { animation-delay: 320ms; }
</style>

<script>
  // Auto-hide when page is ready – works on every Django template
  document.addEventListener('DOMContentLoaded', () => {
    const loader = document.getElementById('coffee-loader');
    
    setTimeout(() => {
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 700);
    }, 800);
  });

</script>

  <script>
    // Parallax scrolling effect
    function initParallax() {
      const parallaxElements = document.querySelectorAll('.parallax-element');
      
      function updateParallax() {
        parallaxElements.forEach(element => {
          const rect = element.getBoundingClientRect();
          const scrollPosition = window.scrollY;
          const elementTop = element.offsetTop;
          const elementHeight = element.offsetHeight;
          
          // Only apply parallax when element is in viewport
          if (rect.top < window.innerHeight && rect.bottom > 0) {
            const yPos = (scrollPosition - elementTop) * 0.5; // 0.5 is the parallax speed
            element.style.transform = `translateY(${yPos}px)`;
          }
        });
      }
      
      window.addEventListener('scroll', updateParallax, { passive: true });
      updateParallax(); // Initial call
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initParallax);
    } else {
      initParallax();
